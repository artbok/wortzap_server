spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres?useUnicode=true&characterEncoding=UTF-8
    username: postgres
    password: postgres
  jpa:
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc.lob.non_contextual_creation: true
        jdbc.batch_size: 250
        order_inserts: true
        order_updates: true
        batch_versioned_data: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: help.sprechai@gmail.com
    password: ${GMAIL_KEY}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
app:
  api-key: ${API_KEY:DEFINE-YOUR-KEY}
  default: ${DEFAULT_LANG:ENG}
  jwt:
    secret: "404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970"
    access-expiration: 900000
    refresh-expiration: 2592000000

server:
  port: 62100
  servlet:
    encoding:
      charset: UTF-8
      force-response: true


